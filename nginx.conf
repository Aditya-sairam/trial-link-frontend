server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This is critical for React Router — without this,
    # hitting /patients/123 directly returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}